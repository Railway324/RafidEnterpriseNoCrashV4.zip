name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Show files
        run: ls -la

      - name: Unzip project
        run: unzip RafidEnterpriseNoCrashV4.zip

      - name: Show unzipped folders
        run: ls -la

      - name: Build APK
        run: |
          cd RafidEnterpriseNoCrashV4
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RafidEnterpriseAPK
          path: RafidEnterpriseNoCrashV4/app/build/outputs/apk/debug/*.apk
